events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /mfe-dashboard-facturas {
      return 301 /mfe-dashboard-facturas/;
    }

    location ~ ^/mfe-dashboard-facturas/(.+\.(js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot))$ {
      try_files /$1 =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location = /mfe-dashboard-facturas/remoteEntry.json {
      try_files /remoteEntry.json =404;
      add_header Content-Type application/json;
      add_header Cache-Control "no-store";
    }

    location = /remoteEntry.json {
      try_files $uri =404;
      add_header Content-Type application/json;
      add_header Cache-Control "no-store";
    }

    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    location /mfe-dashboard-facturas/ {
      rewrite ^/mfe-dashboard-facturas/(.*)$ /$1 break;
      try_files $uri $uri/ /index.html;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;
  }
}
